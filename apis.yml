x-no-public-api: >-
  Wheels Up does not operate a public developer portal. Booking, flight
  management, and member services are exposed exclusively through the
  members-only mobile app and members.wheelsup.com. B2B operator connectivity
  was historically routed through the Avianis platform (acquired September
  2019). Charter brokers may interact via Avinode-style marketplaces but no
  Wheels Up-branded OpenAPI, SDK, or rate-card API is published.
