description: >-
  Wheels Up Experience Inc. (NYSE: UP) is a leading on-demand private aviation
  provider in the U.S., offering charter and membership programs, commercial
  travel benefits through a strategic partnership with Delta Air Lines, and
  cargo services. Founded in 2013 by Kenny Dichter, Wheels Up was rescued from
  potential bankruptcy in September 2023 when a Delta Air Lines-led consortium
  (Delta, Certares, Knighthead, Cox) closed a $500M financing package and took
  a ~95% controlling equity stake. In November 2024 the company acquired the
  Embraer Phenom 300/300E fleet of GrandView Aviation ($105M) and secured
  $332M in equipment financing from Bank of America as part of a multi-year
  fleet modernization toward two core aircraft types (Phenom 300 series and
  Challenger 300/350). In 2025 it launched a new Signature membership
  portfolio and an industry-first integrated self-booking of Delta commercial
  flights inside the Wheels Up members app. Wheels Up does not publish a
  public developer API — its booking surface is a members-only mobile app and
  members.wheelsup.com web portal, with B2B operator connectivity historically
  routed through its acquired Avianis platform (2019).
